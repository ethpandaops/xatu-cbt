name: Docker Build and Push

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      cbt_tag:
        description: 'CBT Docker image tag to use (e.g., latest, v1.0.0)'
        required: false
        default: 'debian-latest'
        type: string

env:
  DOCKER_REPO: ethpandaops/xatu-cbt

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine CBT tag
        id: cbt_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.cbt_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=debian-latest" >> $GITHUB_OUTPUT
          fi

      - name: Fetch CBT image digest
        id: cbt_digest
        run: |
          CBT_TAG="${{ steps.cbt_tag.outputs.tag }}"

          # Get the digest of the CBT image
          DIGEST=$(docker manifest inspect ethpandaops/cbt:${CBT_TAG} --verbose | jq -r '.Descriptor.digest' | cut -d: -f2 | cut -c1-12)

          # If we can't get the digest, try a different approach
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
            # Pull the image metadata and get the digest
            docker pull ethpandaops/cbt:${CBT_TAG} --quiet
            DIGEST=$(docker inspect ethpandaops/cbt:${CBT_TAG} --format='{{.RepoDigests}}' | grep -oE 'sha256:[a-f0-9]{64}' | head -1 | cut -d: -f2 | cut -c1-12)
          fi

          # If still no digest, use a timestamp as fallback
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
            DIGEST=$(date +%Y%m%d%H%M%S)
            echo "Warning: Could not fetch CBT image digest, using timestamp: $DIGEST"
          fi

          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "CBT image digest: ${DIGEST}"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.DOCKER_REPO }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=cbt-${{ steps.cbt_tag.outputs.tag }}
            type=raw,value=cbt-${{ steps.cbt_tag.outputs.tag }}-${{ steps.cbt_digest.outputs.digest }}
            type=raw,value={{branch}}-cbt-${{ steps.cbt_digest.outputs.digest }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CBT_TAG=${{ steps.cbt_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
