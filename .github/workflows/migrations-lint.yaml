name: Migrations Lint

on:
  pull_request:
    paths:
      - 'migrations/**'
      - 'scripts/lint-migrations.sh'
      - 'scripts/check-migrations-syntax.sh'
      - '.github/workflows/migrations-lint.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # ClickHouse image used for the syntax check; matches docker-compose's default.
  CLICKHOUSE_VERSION: 26.2.5.45

jobs:
  # Enforce the database-agnostic rules (no CREATE DATABASE, no db-qualified
  # identifiers, Distributed() uses currentDatabase()). Pure bash, no dependencies.
  database-agnostic:
    name: database-agnostic lint
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Lint migrations are database-agnostic
        run: ./scripts/lint-migrations.sh migrations

  # Validate every migration parses with the real ClickHouse parser. Runs in
  # parallel with the lint job (no `needs`).
  syntax:
    name: clickhouse syntax check
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Authenticated pulls avoid Docker Hub anonymous rate limits. Skipped on
      # forks (no secrets); the pull then falls back to anonymous.
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Validate migrations parse (clickhouse format)
        run: |
          docker run --rm \
            -e GITHUB_ACTIONS=true \
            -v "$PWD":/work -w /work \
            --entrypoint /bin/bash \
            "clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-26.2.5.45}" \
            scripts/check-migrations-syntax.sh migrations
