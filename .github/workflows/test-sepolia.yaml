name: test-sepolia
on:
  pull_request:
  workflow_dispatch:
    inputs:
      xatu_ref:
        description: 'Xatu repository ref to checkout'
        required: false
        default: 'master'
        type: string
permissions:
  contents: read
jobs:
  detect:
    name: Detect impacted models
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.detect.outputs.models }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Detect impacted models
        id: detect
        run: |
          IMPACTED=$(./.github/scripts/detect_impacted_models.sh --network sepolia --base origin/${{ github.base_ref || 'master' }})
          echo "models=$IMPACTED" >> "$GITHUB_OUTPUT"
          echo "Impacted models: $IMPACTED"
  run-tests:
    name: Test sepolia
    needs: detect
    if: needs.detect.outputs.models != 'none'
    runs-on:
      - self-hosted-ghr
      - size-l-x64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up env
        run: |
          cp example.env .env
      - name: Checkout Xatu
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ethpandaops/xatu
          ref: ${{ github.event.inputs.xatu_ref || 'master' }}
          path: xatu
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'
      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build xatu-cbt
        run: make build
      - name: Create cache directory
        run: mkdir -p .parquet_cache
      - name: Start infrastructure
        id: start-infra
        run: ./bin/xatu-cbt infra start
      - name: Run sepolia tests (full suite)
        if: needs.detect.outputs.models == 'all'
        run: ./bin/xatu-cbt test all --network sepolia --verbose
      - name: Run sepolia tests (impacted only)
        if: needs.detect.outputs.models != 'all'
        run: |
          echo "Running impacted models: ${{ needs.detect.outputs.models }}"
          ./bin/xatu-cbt test models ${{ needs.detect.outputs.models }} --network sepolia --verbose
      - name: Stop infrastructure
        if: always() && steps.start-infra.outcome != 'skipped'
        run: ./bin/xatu-cbt infra stop
