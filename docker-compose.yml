volumes:
  cbt-config:
  clickhouse-01-data:
    driver: local
  clickhouse-02-data:
    driver: local
  clickhouse-03-data:
    driver: local
  clickhouse-04-data:
    driver: local
  clickhouse-keeper-01-data:
    driver: local
  clickhouse-keeper-02-data:
    driver: local
  clickhouse-keeper-03-data:
    driver: local

services:
  cbt-redis:
    image: redis:7-alpine
    profiles:
      - ""
    container_name: cbt-redis-${NETWORK}
    # No volume mount - Redis data should not persist across test runs
    # This ensures a clean state when containers are restarted
    command: redis-server
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - xatu_xatu-net

  # Config setup container
  cbt-config-setup:
    image: python:3.12-alpine
    container_name: cbt-config-setup-${NETWORK}
    profiles:
      - ""
    depends_on:
      xatu-cbt-clickhouse-01:
        condition: service_healthy
      xatu-cbt-clickhouse-02:
        condition: service_healthy
      xatu-cbt-clickhouse-03:
        condition: service_healthy
      xatu-cbt-clickhouse-04:
        condition: service_healthy
    volumes:
      - cbt-config:/config
      - ./overrides.yaml:/overrides.yaml:ro
      - ./overrides.tests.yaml:/overrides.tests.yaml:ro
    environment:
      - TESTING=${TESTING:-false}
      - NETWORK=${NETWORK}
      - CLICKHOUSE_USERNAME=${CLICKHOUSE_USERNAME}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    command:
      - /bin/sh
      - -c
      - |
        pip install pyyaml > /dev/null 2>&1
        python3 << 'PYTHON_SCRIPT'
        import yaml
        import os
        
        network = os.environ.get('NETWORK', 'mainnet')
        testing = os.environ.get('TESTING', 'false').lower() == 'true'
        clickhouse_user = os.environ.get('CLICKHOUSE_USERNAME', 'default')
        clickhouse_pass = os.environ.get('CLICKHOUSE_PASSWORD', '')

        # Base configuration
        config = {
            'logging': 'debug',
            'metricsAddr': ':9090',
            'healthCheckAddr': ':8081',
            'clickhouse': {
                'url': f'http://{clickhouse_user}:{clickhouse_pass}@xatu-cbt-clickhouse-01:8123',
                'cluster': '{cluster}',
                'localSuffix': '_local',
                'admin': {
                    'incremental': {
                        'database': network,
                        'table': 'admin_cbt_incremental'
                    },
                    'scheduled': {
                        'database': network,
                        'table': 'admin_cbt_scheduled'
                    }
                }
            },
            'redis': {
                'url': f'redis://cbt-redis-{network}:6379/0'
            },
            'scheduler': {
                'concurrency': 10,
                'consolidation': '@every 10m'
            },
            'worker': {
                'concurrency': 10
            },
            'models': {
                'external': {
                    'defaultCluster': '{raw}',
                    'defaultDatabase': 'default'
                },
                'transformations': {
                    'defaultDatabase': network
                },
                'env': {
                    'NETWORK': network,
                    'EXTERNAL_MODEL_MIN_TIMESTAMP': 0,
                    'EXTERNAL_MODEL_MIN_BLOCK': 0
                }
            },
            'frontend': {
                'enabled': True,
                'addr': ':8080'
            },
            'interval_types': {
                'slot': [
                    {
                        'name': 'Slot',
                        'expression': "math.floor((value - 1606824023) / 12)"
                    },
                    {
                        'name': 'Datetime',
                        'format': 'datetime',
                        'expression': "value * 1000"
                    }
                ],
                'block': [
                    {
                        'name': 'Block number'
                    }
                ],
                'entity': [
                    {
                        'name': 'Validator index'
                    }
                ]
            } 
        }
        
        # Merge with overrides if they exist
        override_file = '/overrides.tests.yaml' if testing else '/overrides.yaml'
        if os.path.exists(override_file) and os.path.getsize(override_file) > 0:
            with open(override_file, 'r') as f:
                overrides = yaml.safe_load(f)
                if overrides:
                    # Deep merge the configurations
                    def deep_merge(base, override):
                        for key, value in override.items():
                            if key in base and isinstance(base[key], dict) and isinstance(value, dict):
                                deep_merge(base[key], value)
                            else:
                                base[key] = value
                    deep_merge(config, overrides)
                    print(f"Merged {'test' if testing else 'production'} overrides")
        
        # Write the final configuration
        with open(f'/config/{network}.yaml', 'w') as f:
            yaml.dump(config, f, default_flow_style=False, sort_keys=False)
        
        print("Config file created successfully")
        PYTHON_SCRIPT

  # CBT Engine
  cbt-engine:
    image: ethpandaops/cbt:debian-latest
    container_name: cbt-engine-${NETWORK}
    profiles:
      - ""
    depends_on:
      cbt-config-setup:
        condition: service_completed_successfully
    volumes:
      - ./models:/models:ro
      - cbt-config:/config:ro
    command: ["--config", "/config/${NETWORK}.yaml"]
    restart: unless-stopped
    ports:
      - "${CBT_FRONTEND_PORT:-8081}:8080"  # Frontend port
    networks:
      - xatu_xatu-net
    deploy:
      replicas: 1

  # Refined cluster `cluster_2S_2R` — 2 shards x 2 replicas (shard 1: 01,02 / shard 2: 03,04)
  xatu-cbt-clickhouse-01:
    image: "clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-26.2.5.45}"
    container_name: xatu-cbt-clickhouse-01
    hostname: xatu-cbt-clickhouse-01
    user: 101:101
    profiles:
      - clickhouse
      - ""
    networks:
      - xatu_xatu-net
    volumes:
      - clickhouse-01-data:/var/lib/clickhouse/
      - ./local-config/${CLICKHOUSE_CONFIG_DIR:-clickhouse}/clickhouse-01/etc/clickhouse-server/config.d/config.xml:/etc/clickhouse-server/config.d/config.xml
      - ./local-config/${CLICKHOUSE_CONFIG_DIR:-clickhouse}/clickhouse-01/etc/clickhouse-server/users.d/users.xml:/etc/clickhouse-server/users.d/users.xml
      - ./local-config/${CLICKHOUSE_CONFIG_DIR:-clickhouse}/clickhouse-01/etc/clickhouse-server/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
      - ./local-config/refined-settings.xml:/etc/clickhouse-server/config.d/refined-settings.xml:ro
    ports:
      - "${CLICKHOUSE_CBT_01_HTTP_ADDRESS:-127.0.0.1}:${CLICKHOUSE_CBT_01_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_CBT_01_NATIVE_ADDRESS:-127.0.0.1}:${CLICKHOUSE_CBT_01_NATIVE_PORT:-9000}:9000"
    depends_on:
      xatu-cbt-clickhouse-keeper-01:
        condition: service_healthy
      xatu-cbt-clickhouse-keeper-02:
        condition: service_healthy
      xatu-cbt-clickhouse-keeper-03:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "set -x; wget --spider --quiet http://xatu-cbt-clickhouse-01:9000 || exit 1; wget --spider --quiet --header 'Host: localhost' --post-data 'query=SELECT 1' http://localhost:8123 || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 15s
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_USER_READONLY_PASSWORD=${CLICKHOUSE_USER_READONLY_PASSWORD:-readonly}
  xatu-cbt-clickhouse-02:
    image: "clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-26.2.5.45}"
    container_name: xatu-cbt-clickhouse-02
    hostname: xatu-cbt-clickhouse-02
    user: 101:101
    profiles:
      - clickhouse
      - ""
    networks:
      - xatu_xatu-net
    volumes:
      - clickhouse-02-data:/var/lib/clickhouse/
      - ./local-config/${CLICKHOUSE_CONFIG_DIR:-clickhouse}/clickhouse-02/etc/clickhouse-server/config.d/config.xml:/etc/clickhouse-server/config.d/config.xml
      - ./local-config/${CLICKHOUSE_CONFIG_DIR:-clickhouse}/clickhouse-02/etc/clickhouse-server/users.d/users.xml:/etc/clickhouse-server/users.d/users.xml
      - ./local-config/${CLICKHOUSE_CONFIG_DIR:-clickhouse}/clickhouse-02/etc/clickhouse-server/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
      - ./local-config/refined-settings.xml:/etc/clickhouse-server/config.d/refined-settings.xml:ro
    ports:
      - "${CLICKHOUSE_CBT_02_HTTP_ADDRESS:-127.0.0.1}:${CLICKHOUSE_CBT_02_HTTP_PORT:-8124}:8123"
      - "${CLICKHOUSE_CBT_02_NATIVE_ADDRESS:-127.0.0.1}:${CLICKHOUSE_CBT_02_NATIVE_PORT:-9001}:9000"
    depends_on:
      xatu-cbt-clickhouse-keeper-01:
        condition: service_healthy
      xatu-cbt-clickhouse-keeper-02:
        condition: service_healthy
      xatu-cbt-clickhouse-keeper-03:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "set -x; wget --spider --quiet http://xatu-cbt-clickhouse-02:9000 || exit 1; wget --spider --quiet --header 'Host: localhost' --post-data 'query=SELECT 1' http://localhost:8123 || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 15s
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_USER_READONLY_PASSWORD=${CLICKHOUSE_USER_READONLY_PASSWORD:-readonly}
  xatu-cbt-clickhouse-03:
    image: "clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-26.2.5.45}"
    container_name: xatu-cbt-clickhouse-03
    hostname: xatu-cbt-clickhouse-03
    user: 101:101
    profiles:
      - clickhouse
      - ""
    networks:
      - xatu_xatu-net
    volumes:
      - clickhouse-03-data:/var/lib/clickhouse/
      - ./local-config/${CLICKHOUSE_CONFIG_DIR:-clickhouse}/clickhouse-03/etc/clickhouse-server/config.d/config.xml:/etc/clickhouse-server/config.d/config.xml
      - ./local-config/${CLICKHOUSE_CONFIG_DIR:-clickhouse}/clickhouse-03/etc/clickhouse-server/users.d/users.xml:/etc/clickhouse-server/users.d/users.xml
      - ./local-config/${CLICKHOUSE_CONFIG_DIR:-clickhouse}/clickhouse-03/etc/clickhouse-server/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
      - ./local-config/refined-settings.xml:/etc/clickhouse-server/config.d/refined-settings.xml:ro
    ports:
      - "${CLICKHOUSE_CBT_03_HTTP_ADDRESS:-127.0.0.1}:${CLICKHOUSE_CBT_03_HTTP_PORT:-8127}:8123"
      - "${CLICKHOUSE_CBT_03_NATIVE_ADDRESS:-127.0.0.1}:${CLICKHOUSE_CBT_03_NATIVE_PORT:-9004}:9000"
    depends_on:
      xatu-cbt-clickhouse-keeper-01:
        condition: service_healthy
      xatu-cbt-clickhouse-keeper-02:
        condition: service_healthy
      xatu-cbt-clickhouse-keeper-03:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "set -x; wget --spider --quiet http://xatu-cbt-clickhouse-03:9000 || exit 1; wget --spider --quiet --header 'Host: localhost' --post-data 'query=SELECT 1' http://localhost:8123 || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 15s
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_USER_READONLY_PASSWORD=${CLICKHOUSE_USER_READONLY_PASSWORD:-readonly}
  xatu-cbt-clickhouse-04:
    image: "clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-26.2.5.45}"
    container_name: xatu-cbt-clickhouse-04
    hostname: xatu-cbt-clickhouse-04
    user: 101:101
    profiles:
      - clickhouse
      - ""
    networks:
      - xatu_xatu-net
    volumes:
      - clickhouse-04-data:/var/lib/clickhouse/
      - ./local-config/${CLICKHOUSE_CONFIG_DIR:-clickhouse}/clickhouse-04/etc/clickhouse-server/config.d/config.xml:/etc/clickhouse-server/config.d/config.xml
      - ./local-config/${CLICKHOUSE_CONFIG_DIR:-clickhouse}/clickhouse-04/etc/clickhouse-server/users.d/users.xml:/etc/clickhouse-server/users.d/users.xml
      - ./local-config/${CLICKHOUSE_CONFIG_DIR:-clickhouse}/clickhouse-04/etc/clickhouse-server/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
      - ./local-config/refined-settings.xml:/etc/clickhouse-server/config.d/refined-settings.xml:ro
    ports:
      - "${CLICKHOUSE_CBT_04_HTTP_ADDRESS:-127.0.0.1}:${CLICKHOUSE_CBT_04_HTTP_PORT:-8128}:8123"
      - "${CLICKHOUSE_CBT_04_NATIVE_ADDRESS:-127.0.0.1}:${CLICKHOUSE_CBT_04_NATIVE_PORT:-9005}:9000"
    depends_on:
      xatu-cbt-clickhouse-keeper-01:
        condition: service_healthy
      xatu-cbt-clickhouse-keeper-02:
        condition: service_healthy
      xatu-cbt-clickhouse-keeper-03:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "set -x; wget --spider --quiet http://xatu-cbt-clickhouse-04:9000 || exit 1; wget --spider --quiet --header 'Host: localhost' --post-data 'query=SELECT 1' http://localhost:8123 || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 15s
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_USER_READONLY_PASSWORD=${CLICKHOUSE_USER_READONLY_PASSWORD:-readonly}
  # ClickHouse Keeper ensemble (3 nodes) — replaces ZooKeeper
  xatu-cbt-clickhouse-keeper-01:
    image: clickhouse/clickhouse-keeper:${CLICKHOUSE_VERSION:-26.2.5.45}
    container_name: xatu-cbt-clickhouse-keeper-01
    hostname: xatu-cbt-clickhouse-keeper-01
    profiles:
      - clickhouse
      - ""
    networks:
      - xatu_xatu-net
    volumes:
      - clickhouse-keeper-01-data:/var/lib/clickhouse
      - ./local-config/clickhouse-keeper/keeper-01/etc/clickhouse-keeper/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-keeper-client -h localhost -p 9181 -q 'get /keeper/api_version' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
  xatu-cbt-clickhouse-keeper-02:
    image: clickhouse/clickhouse-keeper:${CLICKHOUSE_VERSION:-26.2.5.45}
    container_name: xatu-cbt-clickhouse-keeper-02
    hostname: xatu-cbt-clickhouse-keeper-02
    profiles:
      - clickhouse
      - ""
    networks:
      - xatu_xatu-net
    volumes:
      - clickhouse-keeper-02-data:/var/lib/clickhouse
      - ./local-config/clickhouse-keeper/keeper-02/etc/clickhouse-keeper/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-keeper-client -h localhost -p 9181 -q 'get /keeper/api_version' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
  xatu-cbt-clickhouse-keeper-03:
    image: clickhouse/clickhouse-keeper:${CLICKHOUSE_VERSION:-26.2.5.45}
    container_name: xatu-cbt-clickhouse-keeper-03
    hostname: xatu-cbt-clickhouse-keeper-03
    profiles:
      - clickhouse
      - ""
    networks:
      - xatu_xatu-net
    volumes:
      - clickhouse-keeper-03-data:/var/lib/clickhouse
      - ./local-config/clickhouse-keeper/keeper-03/etc/clickhouse-keeper/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-keeper-client -h localhost -p 9181 -q 'get /keeper/api_version' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  xatu_xatu-net:
    external: true
