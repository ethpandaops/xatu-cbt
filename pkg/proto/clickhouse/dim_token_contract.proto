syntax = "proto3";

package cbt;

import "common.proto";

option go_package = "github.com/ethpandaops/xatu-cbt/pkg/proto/clickhouse";
// Contracts that have emitted ERC20/ERC721 Transfer events, classified into a single token_standard by their first transfer

message DimTokenContract {
  // Timestamp when the record was last updated
  uint32 updated_date_time = 11;
  // The token contract address
  string contract_address = 12;
  // Mutually-exclusive classification by the standard of the first Transfer event the contract emitted (first-come-first-serve): erc20 or erc721
  string token_standard = 13;
}

// Request for listing dim_token_contract records
message ListDimTokenContractRequest {
  // Filter by contract_address - The token contract address (PRIMARY KEY - required)
  StringFilter contract_address = 1;

  // Filter by updated_date_time - Timestamp when the record was last updated (optional)
  UInt32Filter updated_date_time = 2;
  // Filter by token_standard - Mutually-exclusive classification by the standard of the first Transfer event the contract emitted (first-come-first-serve): erc20 or erc721 (optional)
  StringFilter token_standard = 3;

  // The maximum number of dim_token_contract to return.
  // If unspecified, at most 100 items will be returned.
  // The maximum value is 10000; values above 10000 will be coerced to 10000.
  int32 page_size = 4;
  // A page token, received from a previous `ListDimTokenContract` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 5;
  // The order of results. Format: comma-separated list of fields.
  // Example: "foo,bar" or "foo desc,bar" for descending order on foo.
  // If unspecified, results will be returned in the default order.
  string order_by = 6;
}

// Response for listing dim_token_contract records
message ListDimTokenContractResponse {
  // The list of dim_token_contract.
  repeated DimTokenContract dim_token_contract = 1;
  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request for getting a single dim_token_contract record by primary key
message GetDimTokenContractRequest {
  // The token contract address
  string contract_address = 1; // Primary key (required)
}

// Response for getting a single dim_token_contract record
message GetDimTokenContractResponse {
  DimTokenContract item = 1;
}

// Query dim_token_contract data
service DimTokenContractService {
  // List records | Retrieve paginated results with optional filtering
  rpc List(ListDimTokenContractRequest) returns (ListDimTokenContractResponse);
  // Get record | Retrieve a single record by primary key
  rpc Get(GetDimTokenContractRequest) returns (GetDimTokenContractResponse);
}
