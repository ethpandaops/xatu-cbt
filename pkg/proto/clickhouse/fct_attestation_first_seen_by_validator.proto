syntax = "proto3";

package cbt;

import "common.proto";
import "google/protobuf/wrappers.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "clickhouse/annotations.proto";

option go_package = "github.com/ethpandaops/xatu-cbt/pkg/proto/clickhouse";
// Per-(slot, validator) first-seen timings for both the unaggregated attestation and the earliest aggregate that included the validator, with the attested votes from each source.

message FctAttestationFirstSeenByValidator {
  // Timestamp when the record was last updated
  uint32 updated_date_time = 11;
  // The slot the validator was attesting for
  uint32 slot = 12;
  // The wall clock time when the slot started
  uint32 slot_start_date_time = 13;
  // The epoch containing the slot
  uint32 epoch = 14;
  // The wall clock time when the epoch started
  uint32 epoch_start_date_time = 15;
  // The validator index
  uint32 validator_index = 16;
  // The committee the validator was assigned to for this slot
  string committee_index = 17;
  // Earliest time (ms after slot start) the unaggregated attestation from this validator was seen. NULL if never seen raw.
  google.protobuf.UInt32Value raw_seen_slot_start_diff = 18;
  // Source the raw attestation was first observed from (beacon_api, libp2p, or empty if never seen raw)
  string raw_source = 19;
  // Head vote from the earliest raw attestation (empty if never seen raw)
  string raw_block_root = 20;
  // Source checkpoint epoch from the earliest raw attestation
  uint32 raw_source_epoch = 21;
  // Source checkpoint root from the earliest raw attestation
  string raw_source_root = 22;
  // Target checkpoint epoch from the earliest raw attestation
  uint32 raw_target_epoch = 23;
  // Target checkpoint root from the earliest raw attestation
  string raw_target_root = 24;
  // Earliest time (ms after slot start) the validator was seen inside an aggregate. NULL if never seen in an aggregate.
  google.protobuf.UInt32Value agg_seen_slot_start_diff = 25;
  // Source the earliest aggregate was observed from (beacon_api, libp2p, or empty if never seen)
  string agg_source = 26;
  // Head vote from the earliest aggregate containing this validator
  string agg_block_root = 27;
  // Source checkpoint epoch from the earliest aggregate containing this validator
  uint32 agg_source_epoch = 28;
  // Source checkpoint root from the earliest aggregate containing this validator
  string agg_source_root = 29;
  // Target checkpoint epoch from the earliest aggregate containing this validator
  uint32 agg_target_epoch = 30;
  // Target checkpoint root from the earliest aggregate containing this validator
  string agg_target_root = 31;
}

// Request for listing fct_attestation_first_seen_by_validator records
message ListFctAttestationFirstSeenByValidatorRequest {
  // Filter by slot_start_date_time - The wall clock time when the slot started (PRIMARY KEY - required unless using alternatives: slot)
  UInt32Filter slot_start_date_time = 1 [(google.api.field_behavior) = OPTIONAL, (clickhouse.v1.required_group) = "primary_key"];

  // Filter by validator_index - The validator index (ORDER BY column 2 - optional)
  UInt32Filter validator_index = 2 [(google.api.field_behavior) = OPTIONAL];

  // Filter by updated_date_time - Timestamp when the record was last updated (optional)
  UInt32Filter updated_date_time = 3 [(google.api.field_behavior) = OPTIONAL];
  // Filter by slot - The slot the validator was attesting for (PROJECTION: p_by_slot - alternative to slot_start_date_time)
  UInt32Filter slot = 4 [(google.api.field_behavior) = OPTIONAL, (clickhouse.v1.projection_name) = "p_by_slot", (clickhouse.v1.projection_alternative_for) = "slot_start_date_time", (clickhouse.v1.required_group) = "primary_key"];
  // Filter by epoch - The epoch containing the slot (optional)
  UInt32Filter epoch = 5 [(google.api.field_behavior) = OPTIONAL];
  // Filter by epoch_start_date_time - The wall clock time when the epoch started (optional)
  UInt32Filter epoch_start_date_time = 6 [(google.api.field_behavior) = OPTIONAL];
  // Filter by committee_index - The committee the validator was assigned to for this slot (optional)
  StringFilter committee_index = 7 [(google.api.field_behavior) = OPTIONAL];
  // Filter by raw_seen_slot_start_diff - Earliest time (ms after slot start) the unaggregated attestation from this validator was seen. NULL if never seen raw. (optional)
  NullableUInt32Filter raw_seen_slot_start_diff = 8 [(google.api.field_behavior) = OPTIONAL];
  // Filter by raw_source - Source the raw attestation was first observed from (beacon_api, libp2p, or empty if never seen raw) (optional)
  StringFilter raw_source = 9 [(google.api.field_behavior) = OPTIONAL];
  // Filter by raw_block_root - Head vote from the earliest raw attestation (empty if never seen raw) (optional)
  StringFilter raw_block_root = 10 [(google.api.field_behavior) = OPTIONAL];
  // Filter by raw_source_epoch - Source checkpoint epoch from the earliest raw attestation (optional)
  UInt32Filter raw_source_epoch = 11 [(google.api.field_behavior) = OPTIONAL];
  // Filter by raw_source_root - Source checkpoint root from the earliest raw attestation (optional)
  StringFilter raw_source_root = 12 [(google.api.field_behavior) = OPTIONAL];
  // Filter by raw_target_epoch - Target checkpoint epoch from the earliest raw attestation (optional)
  UInt32Filter raw_target_epoch = 13 [(google.api.field_behavior) = OPTIONAL];
  // Filter by raw_target_root - Target checkpoint root from the earliest raw attestation (optional)
  StringFilter raw_target_root = 14 [(google.api.field_behavior) = OPTIONAL];
  // Filter by agg_seen_slot_start_diff - Earliest time (ms after slot start) the validator was seen inside an aggregate. NULL if never seen in an aggregate. (optional)
  NullableUInt32Filter agg_seen_slot_start_diff = 15 [(google.api.field_behavior) = OPTIONAL];
  // Filter by agg_source - Source the earliest aggregate was observed from (beacon_api, libp2p, or empty if never seen) (optional)
  StringFilter agg_source = 16 [(google.api.field_behavior) = OPTIONAL];
  // Filter by agg_block_root - Head vote from the earliest aggregate containing this validator (optional)
  StringFilter agg_block_root = 17 [(google.api.field_behavior) = OPTIONAL];
  // Filter by agg_source_epoch - Source checkpoint epoch from the earliest aggregate containing this validator (optional)
  UInt32Filter agg_source_epoch = 18 [(google.api.field_behavior) = OPTIONAL];
  // Filter by agg_source_root - Source checkpoint root from the earliest aggregate containing this validator (optional)
  StringFilter agg_source_root = 19 [(google.api.field_behavior) = OPTIONAL];
  // Filter by agg_target_epoch - Target checkpoint epoch from the earliest aggregate containing this validator (optional)
  UInt32Filter agg_target_epoch = 20 [(google.api.field_behavior) = OPTIONAL];
  // Filter by agg_target_root - Target checkpoint root from the earliest aggregate containing this validator (optional)
  StringFilter agg_target_root = 21 [(google.api.field_behavior) = OPTIONAL];

  // The maximum number of fct_attestation_first_seen_by_validator to return.
  // If unspecified, at most 100 items will be returned.
  // The maximum value is 10000; values above 10000 will be coerced to 10000.
  int32 page_size = 22 [(google.api.field_behavior) = OPTIONAL];
  // A page token, received from a previous `ListFctAttestationFirstSeenByValidator` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 23 [(google.api.field_behavior) = OPTIONAL];
  // The order of results. Format: comma-separated list of fields.
  // Example: "foo,bar" or "foo desc,bar" for descending order on foo.
  // If unspecified, results will be returned in the default order.
  string order_by = 24 [(google.api.field_behavior) = OPTIONAL];
}

// Response for listing fct_attestation_first_seen_by_validator records
message ListFctAttestationFirstSeenByValidatorResponse {
  // The list of fct_attestation_first_seen_by_validator.
  repeated FctAttestationFirstSeenByValidator fct_attestation_first_seen_by_validator = 1;
  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request for getting a single fct_attestation_first_seen_by_validator record by primary key
message GetFctAttestationFirstSeenByValidatorRequest {
  // The wall clock time when the slot started
  uint32 slot_start_date_time = 1; // Primary key (required)
}

// Response for getting a single fct_attestation_first_seen_by_validator record
message GetFctAttestationFirstSeenByValidatorResponse {
  FctAttestationFirstSeenByValidator item = 1;
}

// Query fct_attestation_first_seen_by_validator data
service FctAttestationFirstSeenByValidatorService {
  // List records | Retrieve paginated results with optional filtering
  rpc List(ListFctAttestationFirstSeenByValidatorRequest) returns (ListFctAttestationFirstSeenByValidatorResponse) {
    option (google.api.http) = {
      get: "/api/v1/fct_attestation_first_seen_by_validator"
    };
  }
  // Get record | Retrieve a single record by slot_start_date_time
  rpc Get(GetFctAttestationFirstSeenByValidatorRequest) returns (GetFctAttestationFirstSeenByValidatorResponse) {
    option (google.api.http) = {
      get: "/api/v1/fct_attestation_first_seen_by_validator/{slot_start_date_time}"
    };
  }
}
