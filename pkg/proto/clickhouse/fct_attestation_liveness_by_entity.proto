syntax = "proto3";

package cbt;

import "common.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "clickhouse/annotations.proto";

option go_package = "github.com/ethpandaops/xatu-cbt/pkg/proto/clickhouse";

message FctAttestationLivenessByEntity {
  // Timestamp when the record was last updated
  uint32 updated_date_time = 11;
  // The slot number
  uint32 slot = 12;
  // The wall clock time when the slot started
  uint32 slot_start_date_time = 13;
  // The epoch number containing the slot
  uint32 epoch = 14;
  // The wall clock time when the epoch started
  uint32 epoch_start_date_time = 15;
  // The entity (staking provider) associated with the validators, unknown if not mapped
  string entity = 16;
  // Number of attestations for this entity
  uint32 attestation_count = 17;
  // Number of missed attestations for this entity
  uint32 missed_count = 18;
}

// Request for listing fct_attestation_liveness_by_entity records
message ListFctAttestationLivenessByEntityRequest {
  // Filter by slot_start_date_time - The wall clock time when the slot started (PRIMARY KEY - required)
  UInt32Filter slot_start_date_time = 1 [(google.api.field_behavior) = REQUIRED, (clickhouse.v1.required_group) = "primary_key"];

  // Filter by entity - The entity (staking provider) associated with the validators, unknown if not mapped (ORDER BY column 2 - optional)
  StringFilter entity = 2 [(google.api.field_behavior) = OPTIONAL];

  // Filter by updated_date_time - Timestamp when the record was last updated (optional)
  UInt32Filter updated_date_time = 3 [(google.api.field_behavior) = OPTIONAL];
  // Filter by slot - The slot number (optional)
  UInt32Filter slot = 4 [(google.api.field_behavior) = OPTIONAL];
  // Filter by epoch - The epoch number containing the slot (optional)
  UInt32Filter epoch = 5 [(google.api.field_behavior) = OPTIONAL];
  // Filter by epoch_start_date_time - The wall clock time when the epoch started (optional)
  UInt32Filter epoch_start_date_time = 6 [(google.api.field_behavior) = OPTIONAL];
  // Filter by attestation_count - Number of attestations for this entity (optional)
  UInt32Filter attestation_count = 7 [(google.api.field_behavior) = OPTIONAL];
  // Filter by missed_count - Number of missed attestations for this entity (optional)
  UInt32Filter missed_count = 8 [(google.api.field_behavior) = OPTIONAL];

  // The maximum number of fct_attestation_liveness_by_entity to return.
  // If unspecified, at most 100 items will be returned.
  // The maximum value is 10000; values above 10000 will be coerced to 10000.
  int32 page_size = 9 [(google.api.field_behavior) = OPTIONAL];
  // A page token, received from a previous `ListFctAttestationLivenessByEntity` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 10 [(google.api.field_behavior) = OPTIONAL];
  // The order of results. Format: comma-separated list of fields.
  // Example: "foo,bar" or "foo desc,bar" for descending order on foo.
  // If unspecified, results will be returned in the default order.
  string order_by = 11 [(google.api.field_behavior) = OPTIONAL];
}

// Response for listing fct_attestation_liveness_by_entity records
message ListFctAttestationLivenessByEntityResponse {
  // The list of fct_attestation_liveness_by_entity.
  repeated FctAttestationLivenessByEntity fct_attestation_liveness_by_entity = 1;
  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request for getting a single fct_attestation_liveness_by_entity record by primary key
message GetFctAttestationLivenessByEntityRequest {
  // The wall clock time when the slot started
  uint32 slot_start_date_time = 1; // Primary key (required)
}

// Response for getting a single fct_attestation_liveness_by_entity record
message GetFctAttestationLivenessByEntityResponse {
  FctAttestationLivenessByEntity item = 1;
}

// Query fct_attestation_liveness_by_entity data
service FctAttestationLivenessByEntityService {
  // List records | Retrieve paginated results with optional filtering
  rpc List(ListFctAttestationLivenessByEntityRequest) returns (ListFctAttestationLivenessByEntityResponse) {
    option (google.api.http) = {
      get: "/api/v1/fct_attestation_liveness_by_entity"
    };
  }
  // Get record | Retrieve a single record by slot_start_date_time
  rpc Get(GetFctAttestationLivenessByEntityRequest) returns (GetFctAttestationLivenessByEntityResponse) {
    option (google.api.http) = {
      get: "/api/v1/fct_attestation_liveness_by_entity/{slot_start_date_time}"
    };
  }
}
