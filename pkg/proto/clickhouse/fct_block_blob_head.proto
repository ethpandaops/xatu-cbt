syntax = "proto3";

package cbt;

import "common.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "clickhouse/annotations.proto";

option go_package = "github.com/ethpandaops/xatu-cbt/pkg/proto/clickhouse";

message FctBlockBlobHead {
  // Timestamp when the record was last updated
  uint32 updated_date_time = 11;
  // The slot number
  uint32 slot = 12;
  // The wall clock time when the slot started
  uint32 slot_start_date_time = 13;
  // The epoch number containing the slot
  uint32 epoch = 14;
  // The wall clock time when the epoch started
  uint32 epoch_start_date_time = 15;
  // The beacon block root hash containing the blob
  string block_root = 16;
  // The index of the blob within the block
  uint32 blob_index = 17;
  // The versioned hash derived from the KZG commitment, used as the blob archive key
  string versioned_hash = 18;
  // The KZG commitment of the blob
  string kzg_commitment = 19;
}

// Request for listing fct_block_blob_head records
message ListFctBlockBlobHeadRequest {
  // Filter by slot_start_date_time - The wall clock time when the slot started (PRIMARY KEY - required unless using alternatives: slot)
  UInt32Filter slot_start_date_time = 1 [(google.api.field_behavior) = OPTIONAL, (clickhouse.v1.required_group) = "primary_key"];

  // Filter by block_root - The beacon block root hash containing the blob (ORDER BY column 2 - optional)
  StringFilter block_root = 2 [(google.api.field_behavior) = OPTIONAL];

  // Filter by blob_index - The index of the blob within the block (ORDER BY column 3 - optional)
  UInt32Filter blob_index = 3 [(google.api.field_behavior) = OPTIONAL];

  // Filter by updated_date_time - Timestamp when the record was last updated (optional)
  UInt32Filter updated_date_time = 4 [(google.api.field_behavior) = OPTIONAL];
  // Filter by slot - The slot number (PROJECTION: p_by_slot - alternative to slot_start_date_time)
  UInt32Filter slot = 5 [(google.api.field_behavior) = OPTIONAL, (clickhouse.v1.projection_name) = "p_by_slot", (clickhouse.v1.projection_alternative_for) = "slot_start_date_time", (clickhouse.v1.required_group) = "primary_key"];
  // Filter by epoch - The epoch number containing the slot (optional)
  UInt32Filter epoch = 6 [(google.api.field_behavior) = OPTIONAL];
  // Filter by epoch_start_date_time - The wall clock time when the epoch started (optional)
  UInt32Filter epoch_start_date_time = 7 [(google.api.field_behavior) = OPTIONAL];
  // Filter by versioned_hash - The versioned hash derived from the KZG commitment, used as the blob archive key (optional)
  StringFilter versioned_hash = 8 [(google.api.field_behavior) = OPTIONAL];
  // Filter by kzg_commitment - The KZG commitment of the blob (optional)
  StringFilter kzg_commitment = 9 [(google.api.field_behavior) = OPTIONAL];

  // The maximum number of fct_block_blob_head to return.
  // If unspecified, at most 100 items will be returned.
  // The maximum value is 10000; values above 10000 will be coerced to 10000.
  int32 page_size = 10 [(google.api.field_behavior) = OPTIONAL];
  // A page token, received from a previous `ListFctBlockBlobHead` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 11 [(google.api.field_behavior) = OPTIONAL];
  // The order of results. Format: comma-separated list of fields.
  // Example: "foo,bar" or "foo desc,bar" for descending order on foo.
  // If unspecified, results will be returned in the default order.
  string order_by = 12 [(google.api.field_behavior) = OPTIONAL];
}

// Response for listing fct_block_blob_head records
message ListFctBlockBlobHeadResponse {
  // The list of fct_block_blob_head.
  repeated FctBlockBlobHead fct_block_blob_head = 1;
  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request for getting a single fct_block_blob_head record by primary key
message GetFctBlockBlobHeadRequest {
  // The wall clock time when the slot started
  uint32 slot_start_date_time = 1; // Primary key (required)
}

// Response for getting a single fct_block_blob_head record
message GetFctBlockBlobHeadResponse {
  FctBlockBlobHead item = 1;
}

// Query fct_block_blob_head data
service FctBlockBlobHeadService {
  // List records | Retrieve paginated results with optional filtering
  rpc List(ListFctBlockBlobHeadRequest) returns (ListFctBlockBlobHeadResponse) {
    option (google.api.http) = {
      get: "/api/v1/fct_block_blob_head"
    };
  }
  // Get record | Retrieve a single record by slot_start_date_time
  rpc Get(GetFctBlockBlobHeadRequest) returns (GetFctBlockBlobHeadResponse) {
    option (google.api.http) = {
      get: "/api/v1/fct_block_blob_head/{slot_start_date_time}"
    };
  }
}
