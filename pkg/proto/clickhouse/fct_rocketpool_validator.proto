syntax = "proto3";

package cbt;

import "common.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "clickhouse/annotations.proto";

option go_package = "github.com/ethpandaops/xatu-cbt/pkg/proto/clickhouse";
// Beacon chain validators operated via Rocket Pool (minipool and megapool), linked to their node operator

message FctRocketpoolValidator {
  // Timestamp when the record was last updated
  uint32 updated_date_time = 11;
  // The beacon chain validator index
  uint32 validator_index = 12;
  // The validator BLS public key, lowercase 0x-prefixed
  string pubkey = 13;
  // The Rocket Pool node operator address, lowercase 0x-prefixed
  string node_operator = 14;
  // The Rocket Pool staking mechanism backing this validator: minipool or megapool
  string pool_type = 15;
  // The minipool contract address (minipool) or the validator withdrawal credential address (megapool), lowercase 0x-prefixed
  string pool_address = 16;
  // Wall clock time the backing minipool was created or the megapool deposit was made
  uint32 created_date_time = 17;
}

// Request for listing fct_rocketpool_validator records
message ListFctRocketpoolValidatorRequest {
  // Filter by validator_index - The beacon chain validator index (PRIMARY KEY - required)
  UInt32Filter validator_index = 1 [(google.api.field_behavior) = REQUIRED, (clickhouse.v1.required_group) = "primary_key"];

  // Filter by updated_date_time - Timestamp when the record was last updated (optional)
  UInt32Filter updated_date_time = 2 [(google.api.field_behavior) = OPTIONAL];
  // Filter by pubkey - The validator BLS public key, lowercase 0x-prefixed (optional)
  StringFilter pubkey = 3 [(google.api.field_behavior) = OPTIONAL];
  // Filter by node_operator - The Rocket Pool node operator address, lowercase 0x-prefixed (optional)
  StringFilter node_operator = 4 [(google.api.field_behavior) = OPTIONAL];
  // Filter by pool_type - The Rocket Pool staking mechanism backing this validator: minipool or megapool (optional)
  StringFilter pool_type = 5 [(google.api.field_behavior) = OPTIONAL];
  // Filter by pool_address - The minipool contract address (minipool) or the validator withdrawal credential address (megapool), lowercase 0x-prefixed (optional)
  StringFilter pool_address = 6 [(google.api.field_behavior) = OPTIONAL];
  // Filter by created_date_time - Wall clock time the backing minipool was created or the megapool deposit was made (optional)
  UInt32Filter created_date_time = 7 [(google.api.field_behavior) = OPTIONAL];

  // The maximum number of fct_rocketpool_validator to return.
  // If unspecified, at most 100 items will be returned.
  // The maximum value is 10000; values above 10000 will be coerced to 10000.
  int32 page_size = 8 [(google.api.field_behavior) = OPTIONAL];
  // A page token, received from a previous `ListFctRocketpoolValidator` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 9 [(google.api.field_behavior) = OPTIONAL];
  // The order of results. Format: comma-separated list of fields.
  // Example: "foo,bar" or "foo desc,bar" for descending order on foo.
  // If unspecified, results will be returned in the default order.
  string order_by = 10 [(google.api.field_behavior) = OPTIONAL];
}

// Response for listing fct_rocketpool_validator records
message ListFctRocketpoolValidatorResponse {
  // The list of fct_rocketpool_validator.
  repeated FctRocketpoolValidator fct_rocketpool_validator = 1;
  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request for getting a single fct_rocketpool_validator record by primary key
message GetFctRocketpoolValidatorRequest {
  // The beacon chain validator index
  uint32 validator_index = 1; // Primary key (required)
}

// Response for getting a single fct_rocketpool_validator record
message GetFctRocketpoolValidatorResponse {
  FctRocketpoolValidator item = 1;
}

// Query fct_rocketpool_validator data
service FctRocketpoolValidatorService {
  // List records | Retrieve paginated results with optional filtering
  rpc List(ListFctRocketpoolValidatorRequest) returns (ListFctRocketpoolValidatorResponse) {
    option (google.api.http) = {
      get: "/api/v1/fct_rocketpool_validator"
    };
  }
  // Get record | Retrieve a single record by validator_index
  rpc Get(GetFctRocketpoolValidatorRequest) returns (GetFctRocketpoolValidatorResponse) {
    option (google.api.http) = {
      get: "/api/v1/fct_rocketpool_validator/{validator_index}"
    };
  }
}
