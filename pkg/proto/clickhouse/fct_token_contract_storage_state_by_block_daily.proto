syntax = "proto3";

package cbt;

import "common.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "clickhouse/annotations.proto";

option go_package = "github.com/ethpandaops/xatu-cbt/pkg/proto/clickhouse";
// Daily live storage slots owned by ERC20/ERC721 contracts, by token_standard

message FctTokenContractStorageStateByBlockDaily {
  // Timestamp when the record was last updated
  uint32 updated_date_time = 11;
  // Start of the day period
  string day_start_date = 12;
  // Token standard: erc20 or erc721
  string token_standard = 13;
  // Cumulative active storage slots owned by contracts of this standard at end of day
  int64 active_slots = 14;
}

// Request for listing fct_token_contract_storage_state_by_block_daily records
message ListFctTokenContractStorageStateByBlockDailyRequest {
  // Filter by day_start_date - Start of the day period (PRIMARY KEY - required)
  StringFilter day_start_date = 1 [(google.api.field_behavior) = REQUIRED, (clickhouse.v1.required_group) = "primary_key"];

  // Filter by token_standard - Token standard: erc20 or erc721 (ORDER BY column 2 - optional)
  StringFilter token_standard = 2 [(google.api.field_behavior) = OPTIONAL];

  // Filter by updated_date_time - Timestamp when the record was last updated (optional)
  UInt32Filter updated_date_time = 3 [(google.api.field_behavior) = OPTIONAL];
  // Filter by active_slots - Cumulative active storage slots owned by contracts of this standard at end of day (optional)
  Int64Filter active_slots = 4 [(google.api.field_behavior) = OPTIONAL];

  // The maximum number of fct_token_contract_storage_state_by_block_daily to return.
  // If unspecified, at most 100 items will be returned.
  // The maximum value is 10000; values above 10000 will be coerced to 10000.
  int32 page_size = 5 [(google.api.field_behavior) = OPTIONAL];
  // A page token, received from a previous `ListFctTokenContractStorageStateByBlockDaily` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 6 [(google.api.field_behavior) = OPTIONAL];
  // The order of results. Format: comma-separated list of fields.
  // Example: "foo,bar" or "foo desc,bar" for descending order on foo.
  // If unspecified, results will be returned in the default order.
  string order_by = 7 [(google.api.field_behavior) = OPTIONAL];
}

// Response for listing fct_token_contract_storage_state_by_block_daily records
message ListFctTokenContractStorageStateByBlockDailyResponse {
  // The list of fct_token_contract_storage_state_by_block_daily.
  repeated FctTokenContractStorageStateByBlockDaily fct_token_contract_storage_state_by_block_daily = 1;
  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request for getting a single fct_token_contract_storage_state_by_block_daily record by primary key
message GetFctTokenContractStorageStateByBlockDailyRequest {
  // Start of the day period
  string day_start_date = 1; // Primary key (required)
}

// Response for getting a single fct_token_contract_storage_state_by_block_daily record
message GetFctTokenContractStorageStateByBlockDailyResponse {
  FctTokenContractStorageStateByBlockDaily item = 1;
}

// Query fct_token_contract_storage_state_by_block_daily data
service FctTokenContractStorageStateByBlockDailyService {
  // List records | Retrieve paginated results with optional filtering
  rpc List(ListFctTokenContractStorageStateByBlockDailyRequest) returns (ListFctTokenContractStorageStateByBlockDailyResponse) {
    option (google.api.http) = {
      get: "/api/v1/fct_token_contract_storage_state_by_block_daily"
    };
  }
  // Get record | Retrieve a single record by day_start_date
  rpc Get(GetFctTokenContractStorageStateByBlockDailyRequest) returns (GetFctTokenContractStorageStateByBlockDailyResponse) {
    option (google.api.http) = {
      get: "/api/v1/fct_token_contract_storage_state_by_block_daily/{day_start_date}"
    };
  }
}
