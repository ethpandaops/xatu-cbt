syntax = "proto3";

package cbt;

import "common.proto";

option go_package = "github.com/ethpandaops/xatu-cbt/pkg/proto/clickhouse";
// Each row is one (slot, validator, vote) pair seen inside an aggregate attestation. Two rows for the same (slot, validator) indicate slashable double attestation.

message IntAttestationFirstSeenAggregate {
  // Timestamp when the record was last updated
  uint32 updated_date_time = 11;
  // The slot number
  uint32 slot = 12;
  // The wall clock time when the slot started
  uint32 slot_start_date_time = 13;
  // The epoch number containing the slot
  uint32 epoch = 14;
  // The wall clock time when the epoch started
  uint32 epoch_start_date_time = 15;
  // The index of the validator attesting
  uint32 attesting_validator_index = 16;
  // The committee index the validator is assigned to
  string committee_index = 17;
  // The head vote (beacon block root) from this aggregate
  string block_root = 18;
  // Source checkpoint epoch from this aggregate
  uint32 source_epoch = 19;
  // Source checkpoint root from this aggregate
  string source_root = 20;
  // Target checkpoint epoch from this aggregate
  uint32 target_epoch = 21;
  // Target checkpoint root from this aggregate
  string target_root = 22;
  // The earliest time (ms after slot start) the validator was seen attesting this specific vote inside an aggregate
  uint32 seen_slot_start_diff = 23;
  // The first source this aggregate was observed from (beacon_api or libp2p)
  string source = 24;
}

// Request for listing int_attestation_first_seen_aggregate records
message ListIntAttestationFirstSeenAggregateRequest {
  // Filter by slot_start_date_time - The wall clock time when the slot started (PRIMARY KEY - required)
  UInt32Filter slot_start_date_time = 1;

  // Filter by attesting_validator_index - The index of the validator attesting (ORDER BY column 2 - optional)
  UInt32Filter attesting_validator_index = 2;

  // Filter by block_root - The head vote (beacon block root) from this aggregate (ORDER BY column 3 - optional)
  StringFilter block_root = 3;

  // Filter by source_epoch - Source checkpoint epoch from this aggregate (ORDER BY column 4 - optional)
  UInt32Filter source_epoch = 4;

  // Filter by source_root - Source checkpoint root from this aggregate (ORDER BY column 5 - optional)
  StringFilter source_root = 5;

  // Filter by target_epoch - Target checkpoint epoch from this aggregate (ORDER BY column 6 - optional)
  UInt32Filter target_epoch = 6;

  // Filter by target_root - Target checkpoint root from this aggregate (ORDER BY column 7 - optional)
  StringFilter target_root = 7;

  // Filter by updated_date_time - Timestamp when the record was last updated (optional)
  UInt32Filter updated_date_time = 8;
  // Filter by slot - The slot number (optional)
  UInt32Filter slot = 9;
  // Filter by epoch - The epoch number containing the slot (optional)
  UInt32Filter epoch = 10;
  // Filter by epoch_start_date_time - The wall clock time when the epoch started (optional)
  UInt32Filter epoch_start_date_time = 11;
  // Filter by committee_index - The committee index the validator is assigned to (optional)
  StringFilter committee_index = 12;
  // Filter by seen_slot_start_diff - The earliest time (ms after slot start) the validator was seen attesting this specific vote inside an aggregate (optional)
  UInt32Filter seen_slot_start_diff = 13;
  // Filter by source - The first source this aggregate was observed from (beacon_api or libp2p) (optional)
  StringFilter source = 14;

  // The maximum number of int_attestation_first_seen_aggregate to return.
  // If unspecified, at most 100 items will be returned.
  // The maximum value is 10000; values above 10000 will be coerced to 10000.
  int32 page_size = 15;
  // A page token, received from a previous `ListIntAttestationFirstSeenAggregate` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 16;
  // The order of results. Format: comma-separated list of fields.
  // Example: "foo,bar" or "foo desc,bar" for descending order on foo.
  // If unspecified, results will be returned in the default order.
  string order_by = 17;
}

// Response for listing int_attestation_first_seen_aggregate records
message ListIntAttestationFirstSeenAggregateResponse {
  // The list of int_attestation_first_seen_aggregate.
  repeated IntAttestationFirstSeenAggregate int_attestation_first_seen_aggregate = 1;
  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request for getting a single int_attestation_first_seen_aggregate record by primary key
message GetIntAttestationFirstSeenAggregateRequest {
  // The wall clock time when the slot started
  uint32 slot_start_date_time = 1; // Primary key (required)
}

// Response for getting a single int_attestation_first_seen_aggregate record
message GetIntAttestationFirstSeenAggregateResponse {
  IntAttestationFirstSeenAggregate item = 1;
}

// Query int_attestation_first_seen_aggregate data
service IntAttestationFirstSeenAggregateService {
  // List records | Retrieve paginated results with optional filtering
  rpc List(ListIntAttestationFirstSeenAggregateRequest) returns (ListIntAttestationFirstSeenAggregateResponse);
  // Get record | Retrieve a single record by primary key
  rpc Get(GetIntAttestationFirstSeenAggregateRequest) returns (GetIntAttestationFirstSeenAggregateResponse);
}
