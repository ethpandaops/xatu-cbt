syntax = "proto3";

package cbt;

import "common.proto";

option go_package = "github.com/ethpandaops/xatu-cbt/pkg/proto/clickhouse";
// Rocket Pool Saturn megapool contracts mapped to their node operator

message IntRocketpoolMegapool {
  // Timestamp when the record was last updated
  uint32 updated_date_time = 11;
  // The Rocket Pool megapool contract address, lowercase 0x-prefixed
  string megapool_address = 12;
  // The Rocket Pool node operator that owns the megapool, lowercase 0x-prefixed
  string node_operator = 13;
  // Execution block number the megapool was deployed in
  uint64 created_block_number = 14;
  // Wall clock time the megapool was deployed (decoded from the deposit event)
  uint32 created_date_time = 15;
  // Execution transaction hash that deployed the megapool
  string transaction_hash = 16;
}

// Request for listing int_rocketpool_megapool records
message ListIntRocketpoolMegapoolRequest {
  // Filter by megapool_address - The Rocket Pool megapool contract address, lowercase 0x-prefixed (PRIMARY KEY - required)
  StringFilter megapool_address = 1;

  // Filter by updated_date_time - Timestamp when the record was last updated (optional)
  UInt32Filter updated_date_time = 2;
  // Filter by node_operator - The Rocket Pool node operator that owns the megapool, lowercase 0x-prefixed (optional)
  StringFilter node_operator = 3;
  // Filter by created_block_number - Execution block number the megapool was deployed in (optional)
  UInt64Filter created_block_number = 4;
  // Filter by created_date_time - Wall clock time the megapool was deployed (decoded from the deposit event) (optional)
  UInt32Filter created_date_time = 5;
  // Filter by transaction_hash - Execution transaction hash that deployed the megapool (optional)
  StringFilter transaction_hash = 6;

  // The maximum number of int_rocketpool_megapool to return.
  // If unspecified, at most 100 items will be returned.
  // The maximum value is 10000; values above 10000 will be coerced to 10000.
  int32 page_size = 7;
  // A page token, received from a previous `ListIntRocketpoolMegapool` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 8;
  // The order of results. Format: comma-separated list of fields.
  // Example: "foo,bar" or "foo desc,bar" for descending order on foo.
  // If unspecified, results will be returned in the default order.
  string order_by = 9;
}

// Response for listing int_rocketpool_megapool records
message ListIntRocketpoolMegapoolResponse {
  // The list of int_rocketpool_megapool.
  repeated IntRocketpoolMegapool int_rocketpool_megapool = 1;
  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request for getting a single int_rocketpool_megapool record by primary key
message GetIntRocketpoolMegapoolRequest {
  // The Rocket Pool megapool contract address, lowercase 0x-prefixed
  string megapool_address = 1; // Primary key (required)
}

// Response for getting a single int_rocketpool_megapool record
message GetIntRocketpoolMegapoolResponse {
  IntRocketpoolMegapool item = 1;
}

// Query int_rocketpool_megapool data
service IntRocketpoolMegapoolService {
  // List records | Retrieve paginated results with optional filtering
  rpc List(ListIntRocketpoolMegapoolRequest) returns (ListIntRocketpoolMegapoolResponse);
  // Get record | Retrieve a single record by primary key
  rpc Get(GetIntRocketpoolMegapoolRequest) returns (GetIntRocketpoolMegapoolResponse);
}
