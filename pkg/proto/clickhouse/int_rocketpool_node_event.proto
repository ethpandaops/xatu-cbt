syntax = "proto3";

package cbt;

import "common.proto";

option go_package = "github.com/ethpandaops/xatu-cbt/pkg/proto/clickhouse";
// Rocket Pool node lifecycle events (registration, RPL stake/withdraw, smoothing pool) decoded from execution layer logs

message IntRocketpoolNodeEvent {
  // Timestamp when the record was last updated
  uint32 updated_date_time = 11;
  // Node event name: node_registered, rpl_staked, rpl_withdrawn or smoothing_pool_state_changed
  string event_name = 12;
  // The Rocket Pool node operator address, lowercase 0x-prefixed
  string node_address = 13;
  // RPL amount in wei for rpl_staked/rpl_withdrawn events, otherwise 0
  string rpl_amount_wei = 14;
  // Smoothing pool membership state for smoothing_pool_state_changed events, otherwise false
  bool smoothing_state = 15;
  // Execution block number the event was emitted in
  uint64 event_block_number = 16;
  // Wall clock time of the block the event was emitted in
  uint32 event_date_time = 17;
  // Log index of the event within the block
  uint32 log_index = 18;
}

// Request for listing int_rocketpool_node_event records
message ListIntRocketpoolNodeEventRequest {
  // Filter by event_name - Node event name: node_registered, rpl_staked, rpl_withdrawn or smoothing_pool_state_changed (PRIMARY KEY - required)
  StringFilter event_name = 1;

  // Filter by node_address - The Rocket Pool node operator address, lowercase 0x-prefixed (ORDER BY column 2 - optional)
  StringFilter node_address = 2;

  // Filter by event_block_number - Execution block number the event was emitted in (ORDER BY column 3 - optional)
  UInt64Filter event_block_number = 3;

  // Filter by log_index - Log index of the event within the block (ORDER BY column 4 - optional)
  UInt32Filter log_index = 4;

  // Filter by updated_date_time - Timestamp when the record was last updated (optional)
  UInt32Filter updated_date_time = 5;
  // Filter by rpl_amount_wei - RPL amount in wei for rpl_staked/rpl_withdrawn events, otherwise 0 (optional)
  StringFilter rpl_amount_wei = 6;
  // Filter by smoothing_state - Smoothing pool membership state for smoothing_pool_state_changed events, otherwise false (optional)
  BoolFilter smoothing_state = 7;
  // Filter by event_date_time - Wall clock time of the block the event was emitted in (optional)
  UInt32Filter event_date_time = 8;

  // The maximum number of int_rocketpool_node_event to return.
  // If unspecified, at most 100 items will be returned.
  // The maximum value is 10000; values above 10000 will be coerced to 10000.
  int32 page_size = 9;
  // A page token, received from a previous `ListIntRocketpoolNodeEvent` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 10;
  // The order of results. Format: comma-separated list of fields.
  // Example: "foo,bar" or "foo desc,bar" for descending order on foo.
  // If unspecified, results will be returned in the default order.
  string order_by = 11;
}

// Response for listing int_rocketpool_node_event records
message ListIntRocketpoolNodeEventResponse {
  // The list of int_rocketpool_node_event.
  repeated IntRocketpoolNodeEvent int_rocketpool_node_event = 1;
  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request for getting a single int_rocketpool_node_event record by primary key
message GetIntRocketpoolNodeEventRequest {
  // Node event name: node_registered, rpl_staked, rpl_withdrawn or smoothing_pool_state_changed
  string event_name = 1; // Primary key (required)
}

// Response for getting a single int_rocketpool_node_event record
message GetIntRocketpoolNodeEventResponse {
  IntRocketpoolNodeEvent item = 1;
}

// Query int_rocketpool_node_event data
service IntRocketpoolNodeEventService {
  // List records | Retrieve paginated results with optional filtering
  rpc List(ListIntRocketpoolNodeEventRequest) returns (ListIntRocketpoolNodeEventResponse);
  // Get record | Retrieve a single record by primary key
  rpc Get(GetIntRocketpoolNodeEventRequest) returns (GetIntRocketpoolNodeEventResponse);
}
