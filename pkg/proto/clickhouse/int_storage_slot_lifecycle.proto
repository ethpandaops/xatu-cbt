syntax = "proto3";

package cbt;

import "common.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/ethpandaops/xatu-cbt/pkg/proto/clickhouse";
// Per-slot lifecycle metrics: birth/death blocks, touch counts, and touch-to-touch interval statistics. A lifecycle starts when a slot transitions from zero to non-zero (birth) and ends at the reverse (death). A slot can have multiple lifecycles.

message IntStorageSlotLifecycle {
  // Timestamp when the record was last updated
  uint32 updated_date_time = 11;
  // The contract address
  string address = 12;
  // The storage slot key
  string slot_key = 13;
  // Reincarnation counter for this slot (1 = first lifecycle, 2 = second, etc.)
  uint32 lifecycle_number = 14;
  // Block where the slot transitioned from 0 to non-zero effective bytes
  uint32 birth_block = 15;
  // Block where the slot transitioned from non-zero to 0 effective bytes (NULL if still alive)
  google.protobuf.UInt32Value death_block = 16;
  // Number of blocks between birth and death (NULL if still alive)
  google.protobuf.UInt32Value lifespan_blocks = 17;
  // Total number of times this slot was touched during this lifecycle
  uint32 touch_count = 18;
  // Number of effective bytes at birth (the to_value of the 0->non-zero transition)
  uint32 effective_bytes_birth = 19;
  // Maximum effective bytes observed during this lifecycle
  uint32 effective_bytes_peak = 20;
  // Number of effective bytes before death (the from_value of the non-zero->0 transition, NULL if still alive)
  google.protobuf.UInt32Value effective_bytes_death = 21;
  // Most recent block where this slot was touched in this lifecycle
  uint32 last_touch_block = 22;
  // Number of touch-to-touch intervals observed (touch_count - 1 when > 1)
  uint32 interval_count = 23;
  // Sum of all touch-to-touch intervals in blocks (for computing mean)
  uint64 interval_sum = 24;
  // Maximum touch-to-touch interval in blocks
  uint32 interval_max = 25;
}

// Request for listing int_storage_slot_lifecycle records
message ListIntStorageSlotLifecycleRequest {
  // Filter by address - The contract address (PRIMARY KEY - required)
  StringFilter address = 1;

  // Filter by slot_key - The storage slot key (ORDER BY column 2 - optional)
  StringFilter slot_key = 2;

  // Filter by lifecycle_number - Reincarnation counter for this slot (1 = first lifecycle, 2 = second, etc.) (ORDER BY column 3 - optional)
  UInt32Filter lifecycle_number = 3;

  // Filter by updated_date_time - Timestamp when the record was last updated (optional)
  UInt32Filter updated_date_time = 4;
  // Filter by birth_block - Block where the slot transitioned from 0 to non-zero effective bytes (optional)
  UInt32Filter birth_block = 5;
  // Filter by death_block - Block where the slot transitioned from non-zero to 0 effective bytes (NULL if still alive) (optional)
  NullableUInt32Filter death_block = 6;
  // Filter by lifespan_blocks - Number of blocks between birth and death (NULL if still alive) (optional)
  NullableUInt32Filter lifespan_blocks = 7;
  // Filter by touch_count - Total number of times this slot was touched during this lifecycle (optional)
  UInt32Filter touch_count = 8;
  // Filter by effective_bytes_birth - Number of effective bytes at birth (the to_value of the 0->non-zero transition) (optional)
  UInt32Filter effective_bytes_birth = 9;
  // Filter by effective_bytes_peak - Maximum effective bytes observed during this lifecycle (optional)
  UInt32Filter effective_bytes_peak = 10;
  // Filter by effective_bytes_death - Number of effective bytes before death (the from_value of the non-zero->0 transition, NULL if still alive) (optional)
  NullableUInt32Filter effective_bytes_death = 11;
  // Filter by last_touch_block - Most recent block where this slot was touched in this lifecycle (optional)
  UInt32Filter last_touch_block = 12;
  // Filter by interval_count - Number of touch-to-touch intervals observed (touch_count - 1 when > 1) (optional)
  UInt32Filter interval_count = 13;
  // Filter by interval_sum - Sum of all touch-to-touch intervals in blocks (for computing mean) (optional)
  UInt64Filter interval_sum = 14;
  // Filter by interval_max - Maximum touch-to-touch interval in blocks (optional)
  UInt32Filter interval_max = 15;

  // The maximum number of int_storage_slot_lifecycle to return.
  // If unspecified, at most 100 items will be returned.
  // The maximum value is 10000; values above 10000 will be coerced to 10000.
  int32 page_size = 16;
  // A page token, received from a previous `ListIntStorageSlotLifecycle` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 17;
  // The order of results. Format: comma-separated list of fields.
  // Example: "foo,bar" or "foo desc,bar" for descending order on foo.
  // If unspecified, results will be returned in the default order.
  string order_by = 18;
}

// Response for listing int_storage_slot_lifecycle records
message ListIntStorageSlotLifecycleResponse {
  // The list of int_storage_slot_lifecycle.
  repeated IntStorageSlotLifecycle int_storage_slot_lifecycle = 1;
  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request for getting a single int_storage_slot_lifecycle record by primary key
message GetIntStorageSlotLifecycleRequest {
  // The contract address
  string address = 1; // Primary key (required)
}

// Response for getting a single int_storage_slot_lifecycle record
message GetIntStorageSlotLifecycleResponse {
  IntStorageSlotLifecycle item = 1;
}

// Query int_storage_slot_lifecycle data
service IntStorageSlotLifecycleService {
  // List records | Retrieve paginated results with optional filtering
  rpc List(ListIntStorageSlotLifecycleRequest) returns (ListIntStorageSlotLifecycleResponse);
  // Get record | Retrieve a single record by primary key
  rpc Get(GetIntStorageSlotLifecycleRequest) returns (GetIntStorageSlotLifecycleResponse);
}
