syntax = "proto3";

package cbt;

import "common.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/ethpandaops/xatu-cbt/pkg/proto/clickhouse";
// Lifecycle boundaries per storage slot: birth (0→non-zero) and death (non-zero→0) blocks with effective bytes at each transition.

message IntStorageSlotLifecycleBoundary {
  // Timestamp when the record was last updated
  uint32 updated_date_time = 11;
  // The contract address
  string address = 12;
  // The storage slot key
  string slot_key = 13;
  // Reincarnation counter for this slot (1 = first lifecycle, 2 = second, etc.)
  uint32 lifecycle_number = 14;
  // Block where the slot transitioned from 0 to non-zero effective bytes
  uint32 birth_block = 15;
  // Block where the slot transitioned from non-zero to 0 effective bytes (NULL if still alive)
  google.protobuf.UInt32Value death_block = 16;
  // Number of effective bytes at birth (the to_value of the 0->non-zero transition)
  uint32 effective_bytes_birth = 17;
  // Number of effective bytes before death (the from_value of the non-zero->0 transition, NULL if still alive)
  google.protobuf.UInt32Value effective_bytes_death = 18;
}

// Request for listing int_storage_slot_lifecycle_boundary records
message ListIntStorageSlotLifecycleBoundaryRequest {
  // Filter by address - The contract address (PRIMARY KEY - required)
  StringFilter address = 1;

  // Filter by slot_key - The storage slot key (ORDER BY column 2 - optional)
  StringFilter slot_key = 2;

  // Filter by lifecycle_number - Reincarnation counter for this slot (1 = first lifecycle, 2 = second, etc.) (ORDER BY column 3 - optional)
  UInt32Filter lifecycle_number = 3;

  // Filter by updated_date_time - Timestamp when the record was last updated (optional)
  UInt32Filter updated_date_time = 4;
  // Filter by birth_block - Block where the slot transitioned from 0 to non-zero effective bytes (optional)
  UInt32Filter birth_block = 5;
  // Filter by death_block - Block where the slot transitioned from non-zero to 0 effective bytes (NULL if still alive) (optional)
  NullableUInt32Filter death_block = 6;
  // Filter by effective_bytes_birth - Number of effective bytes at birth (the to_value of the 0->non-zero transition) (optional)
  UInt32Filter effective_bytes_birth = 7;
  // Filter by effective_bytes_death - Number of effective bytes before death (the from_value of the non-zero->0 transition, NULL if still alive) (optional)
  NullableUInt32Filter effective_bytes_death = 8;

  // The maximum number of int_storage_slot_lifecycle_boundary to return.
  // If unspecified, at most 100 items will be returned.
  // The maximum value is 10000; values above 10000 will be coerced to 10000.
  int32 page_size = 9;
  // A page token, received from a previous `ListIntStorageSlotLifecycleBoundary` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 10;
  // The order of results. Format: comma-separated list of fields.
  // Example: "foo,bar" or "foo desc,bar" for descending order on foo.
  // If unspecified, results will be returned in the default order.
  string order_by = 11;
}

// Response for listing int_storage_slot_lifecycle_boundary records
message ListIntStorageSlotLifecycleBoundaryResponse {
  // The list of int_storage_slot_lifecycle_boundary.
  repeated IntStorageSlotLifecycleBoundary int_storage_slot_lifecycle_boundary = 1;
  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request for getting a single int_storage_slot_lifecycle_boundary record by primary key
message GetIntStorageSlotLifecycleBoundaryRequest {
  // The contract address
  string address = 1; // Primary key (required)
}

// Response for getting a single int_storage_slot_lifecycle_boundary record
message GetIntStorageSlotLifecycleBoundaryResponse {
  IntStorageSlotLifecycleBoundary item = 1;
}

// Query int_storage_slot_lifecycle_boundary data
service IntStorageSlotLifecycleBoundaryService {
  // List records | Retrieve paginated results with optional filtering
  rpc List(ListIntStorageSlotLifecycleBoundaryRequest) returns (ListIntStorageSlotLifecycleBoundaryResponse);
  // Get record | Retrieve a single record by primary key
  rpc Get(GetIntStorageSlotLifecycleBoundaryRequest) returns (GetIntStorageSlotLifecycleBoundaryResponse);
}
