syntax = "proto3";

package cbt;

import "common.proto";

option go_package = "github.com/ethpandaops/xatu-cbt/pkg/proto/clickhouse";
// Cumulative live storage slots owned by ERC20/ERC721 contracts per block, split by token_standard

message IntTokenContractStorageStateByBlock {
  // Timestamp when the record was last updated
  uint32 updated_date_time = 11;
  // The block number
  uint32 block_number = 12;
  // Token standard: erc20 or erc721
  string token_standard = 13;
  // Change in active slots owned by contracts of this standard at this block
  int32 slots_delta = 14;
  // Cumulative active storage slots owned by contracts of this standard at this block
  int64 active_slots = 15;
}

// Request for listing int_token_contract_storage_state_by_block records
message ListIntTokenContractStorageStateByBlockRequest {
  // Filter by block_number - The block number (PRIMARY KEY - required)
  UInt32Filter block_number = 1;

  // Filter by token_standard - Token standard: erc20 or erc721 (ORDER BY column 2 - optional)
  StringFilter token_standard = 2;

  // Filter by updated_date_time - Timestamp when the record was last updated (optional)
  UInt32Filter updated_date_time = 3;
  // Filter by slots_delta - Change in active slots owned by contracts of this standard at this block (optional)
  Int32Filter slots_delta = 4;
  // Filter by active_slots - Cumulative active storage slots owned by contracts of this standard at this block (optional)
  Int64Filter active_slots = 5;

  // The maximum number of int_token_contract_storage_state_by_block to return.
  // If unspecified, at most 100 items will be returned.
  // The maximum value is 10000; values above 10000 will be coerced to 10000.
  int32 page_size = 6;
  // A page token, received from a previous `ListIntTokenContractStorageStateByBlock` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 7;
  // The order of results. Format: comma-separated list of fields.
  // Example: "foo,bar" or "foo desc,bar" for descending order on foo.
  // If unspecified, results will be returned in the default order.
  string order_by = 8;
}

// Response for listing int_token_contract_storage_state_by_block records
message ListIntTokenContractStorageStateByBlockResponse {
  // The list of int_token_contract_storage_state_by_block.
  repeated IntTokenContractStorageStateByBlock int_token_contract_storage_state_by_block = 1;
  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request for getting a single int_token_contract_storage_state_by_block record by primary key
message GetIntTokenContractStorageStateByBlockRequest {
  // The block number
  uint32 block_number = 1; // Primary key (required)
}

// Response for getting a single int_token_contract_storage_state_by_block record
message GetIntTokenContractStorageStateByBlockResponse {
  IntTokenContractStorageStateByBlock item = 1;
}

// Query int_token_contract_storage_state_by_block data
service IntTokenContractStorageStateByBlockService {
  // List records | Retrieve paginated results with optional filtering
  rpc List(ListIntTokenContractStorageStateByBlockRequest) returns (ListIntTokenContractStorageStateByBlockResponse);
  // Get record | Retrieve a single record by primary key
  rpc Get(GetIntTokenContractStorageStateByBlockRequest) returns (GetIntTokenContractStorageStateByBlockResponse);
}
