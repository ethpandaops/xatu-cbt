model: beacon_api_eth_v1_events_attestation
network: mainnet
external_data:
    beacon_api_eth_v1_events_attestation:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/beacon_api_eth_v1_events_attestation.parquet
        network_column: meta_network_name
assertions:
    - name: total count
      # The fixture has 17 rows that duplicate another by the table's ReplacingMergeTree ORDER BY
      # key, so after dedup the table holds 983 distinct rows.
      sql: |
        SELECT COUNT(*) AS count
        FROM cluster('{raw}', default.beacon_api_eth_v1_events_attestation)
      expected:
        count: 983
