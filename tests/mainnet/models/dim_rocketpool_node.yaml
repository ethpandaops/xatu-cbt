model: dim_rocketpool_node
network: mainnet
external_data:
    canonical_execution_logs:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/dim_rocketpool_node_canonical_execution_logs.parquet
        network_column: meta_network_name
    canonical_execution_block:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/dim_rocketpool_node_canonical_execution_block.parquet
        network_column: meta_network_name
    canonical_execution_transaction:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/dim_rocketpool_node_canonical_execution_transaction.parquet
        network_column: meta_network_name
    canonical_beacon_validators_withdrawal_credentials:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/dim_rocketpool_node_canonical_beacon_validators_withdrawal_credentials.parquet
        network_column: meta_network_name
    canonical_beacon_validators_pubkeys:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/dim_rocketpool_node_canonical_beacon_validators_pubkeys.parquet
        network_column: meta_network_name
assertions:
    - name: Row count should be non-negative
      sql: |
        SELECT COUNT(*) AS row_count FROM dim_rocketpool_node FINAL
      assertions:
        - type: greater_than_or_equal
          column: row_count
          value: 0
    - name: One row per node operator
      sql: |
        SELECT COUNT(*) AS bad_rows
        FROM (
          SELECT node_operator, COUNT(*) AS dupes
          FROM dim_rocketpool_node FINAL
          GROUP BY node_operator
          HAVING dupes > 1
        )
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: Active minipool count must not exceed total minipool count
      sql: |
        SELECT COUNT(*) AS bad_rows FROM dim_rocketpool_node FINAL
        WHERE active_minipool_count > minipool_count
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: Every node operator must have at least one minipool or megapool validator
      sql: |
        SELECT COUNT(*) AS bad_rows FROM dim_rocketpool_node FINAL
        WHERE minipool_count = 0 AND megapool_validator_count = 0
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: Node operator must be a 42 char hex string
      sql: |
        SELECT COUNT(*) AS bad_rows FROM dim_rocketpool_node FINAL
        WHERE NOT match(node_operator, '^0x[0-9a-f]{40}$')
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: Has been scheduled at least once
      sql: |
        SELECT COUNT(*) AS count FROM admin_cbt_scheduled FINAL
        WHERE table = 'dim_rocketpool_node'
      assertions:
        - type: equals
          column: count
          value: 1
