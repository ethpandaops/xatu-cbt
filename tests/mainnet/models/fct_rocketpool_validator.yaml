model: fct_rocketpool_validator
network: mainnet
external_data:
    canonical_beacon_validators_pubkeys:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/fct_rocketpool_validator_canonical_beacon_validators_pubkeys.parquet
        network_column: meta_network_name
    canonical_beacon_validators_withdrawal_credentials:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/fct_rocketpool_validator_canonical_beacon_validators_withdrawal_credentials.parquet
        network_column: meta_network_name
    canonical_execution_logs:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/fct_rocketpool_validator_canonical_execution_logs.parquet
        network_column: meta_network_name
    canonical_execution_traces:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/fct_rocketpool_validator_canonical_execution_traces.parquet
        network_column: meta_network_name
assertions:
    - name: Row count should be greater than zero
      sql: |
        SELECT COUNT(*) AS row_count FROM fct_rocketpool_validator FINAL
      assertions:
        - type: greater_than
          column: row_count
          value: 0
    - name: No negative validator_index values
      sql: |
        SELECT COUNT(*) AS bad_rows FROM fct_rocketpool_validator FINAL
        WHERE validator_index < 0
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: pool_type only contains valid enum values
      sql: |
        SELECT COUNT(*) AS bad_rows FROM fct_rocketpool_validator FINAL
        WHERE pool_type NOT IN ('minipool', 'megapool')
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: node_operator should never be empty
      sql: |
        SELECT COUNT(*) AS bad_rows FROM fct_rocketpool_validator FINAL
        WHERE node_operator = '' OR node_operator IS NULL
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: pool_address should never be empty
      sql: |
        SELECT COUNT(*) AS bad_rows FROM fct_rocketpool_validator FINAL
        WHERE pool_address = '' OR pool_address IS NULL
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: validator_index should be unique per pool assignment
      sql: |
        SELECT COUNT(*) AS duplicate_rows FROM (
          SELECT validator_index FROM fct_rocketpool_validator FINAL
          GROUP BY validator_index
          HAVING COUNT(*) > 1
        )
      assertions:
        - type: equals
          column: duplicate_rows
          value: 0
    - name: updated_date_time should be consistent for the latest run
      sql: |
        SELECT COUNT(DISTINCT updated_date_time) AS distinct_updates
        FROM fct_rocketpool_validator FINAL
      assertions:
        - type: equals
          column: distinct_updates
          value: 1
    - name: created_date_time should not be after updated_date_time
      sql: |
        SELECT COUNT(*) AS bad_rows FROM fct_rocketpool_validator FINAL
        WHERE created_date_time > updated_date_time
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: At least one megapool validator should exist
      sql: |
        SELECT COUNT(*) AS megapool_count FROM fct_rocketpool_validator FINAL
        WHERE pool_type = 'megapool'
      assertions:
        - type: greater_than
          column: megapool_count
          value: 0
    - name: pubkey when present should be a valid length hex string
      sql: |
        SELECT COUNT(*) AS bad_rows FROM fct_rocketpool_validator FINAL
        WHERE pubkey != '' AND length(pubkey) != 98
      assertions:
        - type: equals
          column: bad_rows
          value: 0
