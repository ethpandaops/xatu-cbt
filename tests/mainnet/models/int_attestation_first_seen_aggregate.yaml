model: int_attestation_first_seen_aggregate
network: mainnet
external_data:
    libp2p_gossipsub_aggregate_and_proof:
        url: https://data.ethpandaops.io/xatu-cbt/mainnet/fusaka/int_attestation_first_seen_aggregate_libp2p_gossipsub_aggregate_and_proof.parquet
        network_column: meta_network_name
    canonical_beacon_committee:
        url: https://data.ethpandaops.io/xatu-cbt/mainnet/fusaka/int_attestation_first_seen_aggregate_canonical_beacon_committee.parquet
        network_column: meta_network_name
    canonical_beacon_block:
        url: https://data.ethpandaops.io/xatu-cbt/mainnet/fusaka/int_attestation_first_seen_aggregate_canonical_beacon_block_v5.parquet
        network_column: meta_network_name
assertions:
    - name: Row count should be greater than zero
      sql: |
        SELECT COUNT(*) AS count FROM int_attestation_first_seen_aggregate FINAL
      assertions:
        - type: greater_than
          column: count
          value: 0
    - name: Slot values should be non-negative
      sql: |
        SELECT COUNT(*) AS negative_slots FROM int_attestation_first_seen_aggregate FINAL WHERE slot < 0
      assertions:
        - type: equals
          column: negative_slots
          value: 0
    - name: Epoch values should be non-negative
      sql: |
        SELECT COUNT(*) AS negative_epochs FROM int_attestation_first_seen_aggregate FINAL WHERE epoch < 0
      assertions:
        - type: equals
          column: negative_epochs
          value: 0
    - name: Validator index should be non-negative
      sql: |
        SELECT COUNT(*) AS negative_validators FROM int_attestation_first_seen_aggregate FINAL WHERE attesting_validator_index < 0
      assertions:
        - type: equals
          column: negative_validators
          value: 0
    - name: Source should only contain libp2p_gossipsub_aggregate_and_proof
      sql: |
        SELECT COUNT(*) AS invalid_source_count FROM int_attestation_first_seen_aggregate FINAL WHERE source != 'libp2p_gossipsub_aggregate_and_proof'
      assertions:
        - type: equals
          column: invalid_source_count
          value: 0
    - name: Seen slot start diff should be non-negative
      sql: |
        SELECT COUNT(*) AS negative_diff_count FROM int_attestation_first_seen_aggregate FINAL WHERE seen_slot_start_diff < 0
      assertions:
        - type: equals
          column: negative_diff_count
          value: 0
    - name: Block root should not be empty
      sql: |
        SELECT COUNT(*) AS empty_block_roots FROM int_attestation_first_seen_aggregate FINAL WHERE block_root = '' OR block_root IS NULL
      assertions:
        - type: equals
          column: empty_block_roots
          value: 0
    - name: Target root should not be empty
      sql: |
        SELECT COUNT(*) AS empty_target_roots FROM int_attestation_first_seen_aggregate FINAL WHERE target_root = '' OR target_root IS NULL
      assertions:
        - type: equals
          column: empty_target_roots
          value: 0
    - name: (slot_start_date_time, validator_index, vote) should be unique
      sql: |
        SELECT COUNT(*) AS dupes FROM (
          SELECT slot_start_date_time, attesting_validator_index,
                 block_root, source_epoch, source_root, target_epoch, target_root,
                 COUNT(*) AS n
          FROM int_attestation_first_seen_aggregate FINAL
          GROUP BY slot_start_date_time, attesting_validator_index,
                   block_root, source_epoch, source_root, target_epoch, target_root
          HAVING n > 1
        )
      assertions:
        - type: equals
          column: dupes
          value: 0
