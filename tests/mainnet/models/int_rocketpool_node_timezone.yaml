model: int_rocketpool_node_timezone
network: mainnet
external_data:
    canonical_execution_transaction:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/int_rocketpool_node_timezone_canonical_execution_transaction.parquet
        network_column: meta_network_name
    canonical_execution_block:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/int_rocketpool_node_timezone_canonical_execution_block.parquet
        network_column: meta_network_name
assertions:
    - name: Row count should be non-negative
      sql: |
        SELECT COUNT(*) AS row_count FROM int_rocketpool_node_timezone FINAL
      assertions:
        - type: greater_than_or_equal
          column: row_count
          value: 0
    - name: Node address must be a 42 char hex string
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_rocketpool_node_timezone FINAL
        WHERE NOT match(node_address, '^0x[0-9a-f]{40}$')
      assertions:
        - type: equals
          column: bad_rows
          value: 0
