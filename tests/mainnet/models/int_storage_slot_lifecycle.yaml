model: int_storage_slot_lifecycle
network: mainnet
external_data:
    canonical_execution_contracts:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/int_storage_slot_lifecycle_canonical_execution_contracts.parquet
        network_column: meta_network_name
    canonical_execution_storage_diffs:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/int_storage_slot_lifecycle_canonical_execution_storage_diffs.parquet
        network_column: meta_network_name
    canonical_execution_storage_reads:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/int_storage_slot_lifecycle_canonical_execution_storage_reads.parquet
        network_column: meta_network_name
    canonical_execution_traces:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/int_storage_slot_lifecycle_canonical_execution_traces.parquet
        network_column: meta_network_name
    canonical_execution_transaction:
        url: https://data.ethpandaops.io/xatu-cbt/tests/mainnet/int_storage_slot_lifecycle_canonical_execution_transaction.parquet
        network_column: meta_network_name
assertions:
    - name: Row count should be greater than zero
      sql: |
        SELECT COUNT(*) AS row_count FROM int_storage_slot_lifecycle FINAL
      assertions:
        - type: greater_than
          column: row_count
          value: 0
    - name: No rows with zero touch count
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE touch_count < 1
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: No null address or slot_key values
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE address IS NULL OR slot_key IS NULL
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: effective_bytes_peak should be at least effective_bytes_birth
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE effective_bytes_peak < effective_bytes_birth
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: last_touch_block should be at or after birth_block
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE last_touch_block < birth_block
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: lifespan_blocks should be non-negative when death_block is set
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE death_block IS NOT NULL AND lifespan_blocks < 0
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: interval_count should not exceed touch_count minus one
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE interval_count > touch_count - 1
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: interval_count should equal touch_count minus one
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE touch_count > 0 AND interval_count != touch_count - 1
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: interval_sum should be at least interval_max when intervals exist
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE interval_count > 0 AND interval_sum < interval_max
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: interval stats should be zero when there are no intervals
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE interval_count = 0 AND (interval_sum > 0 OR interval_max > 0)
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: No null lifecycle_number or birth_block
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE lifecycle_number IS NULL OR birth_block IS NULL
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: lifecycle_number should be positive
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE lifecycle_number = 0
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: death_block should be at or after birth_block when set
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE death_block IS NOT NULL AND death_block < birth_block
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: lifespan should equal death_block minus birth_block when set
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE death_block IS NOT NULL
          AND lifespan_blocks != death_block - birth_block
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: last_touch_block should be within lifecycle bounds when death_block is set
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE death_block IS NOT NULL AND last_touch_block > death_block
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: effective bytes should be within 0-32 bounds
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE effective_bytes_birth > 32
           OR effective_bytes_peak > 32
           OR (effective_bytes_death IS NOT NULL AND effective_bytes_death > 32)
      assertions:
        - type: equals
          column: bad_rows
          value: 0
    - name: effective_bytes_death should be null when death_block is null
      sql: |
        SELECT COUNT(*) AS bad_rows FROM int_storage_slot_lifecycle FINAL
        WHERE death_block IS NULL AND effective_bytes_death IS NOT NULL
      assertions:
        - type: equals
          column: bad_rows
          value: 0
